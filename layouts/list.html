{{define "main"}} {{ .Content }}
<ul class="flex flex-wrap p-1">
    {{ range.Data.Pages }}
    <li class="card m-4">
        <a class="font-bold text-xl" href="{{ .RelPermalink }}">{{ .Title }}</a>
        <p class="line-clamp-3 pt-0.5">{{.Description}}</p>
        <div className="shine"></div>
    </li>
    {{ end }}
</ul>
{{end}}
