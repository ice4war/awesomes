{{define "main"}} {{ .Content }}
<ul class="flex flex-wrap p-4">
    {{ range.Data.Pages }}
    <li class="card m-4">
        <div class="content">
            <h3 class="font-bold text-2xl text-center">
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            </h3>
        </div>
    </li>
    {{ end }}
</ul>
{{end}}
